# Production orchestration. Pulls pre-built images from Docker Hub
# instead of building locally. Run on the prod server with:
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Required env file: .env.prod at the repo root (gitignored). It must
# define DOCKERHUB_USERNAME, IMAGE_TAG, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
# JWT_SECRET, POSTGRES_PASSWORD, CONTACT_NOTIFICATION_EMAIL, SPRING_MAIL_*,
# OAUTH2_REDIRECT_URI, CORS_ALLOWED_ORIGINS.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: accounting_firm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No `ports:` block in prod — DB is reachable only inside the Docker network.
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d accounting_firm"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKERHUB_USERNAME}/accounting-firm-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/accounting_firm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      OAUTH2_REDIRECT_URI_ADMIN: http://localhost:4200/admin/clients
      OAUTH2_REDIRECT_URI_USER: http://localhost:4200/portal/dashboard
      UPLOAD_DIR: /app/uploads
    # No `ports:` block — backend is reached via the frontend nginx proxy.
    volumes:
      - ./uploads:/app/uploads

  frontend:
    image: ${DOCKERHUB_USERNAME}/accounting-firm-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env.prod
    ports:
      - "80:80"
    # Put a reverse proxy (Caddy/Traefik) or load balancer in front of
    # this for HTTPS — never expose port 80 directly to the public
    # internet without TLS termination upstream.

volumes:
  db_data:
  backend_uploads:
