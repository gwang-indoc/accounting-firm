spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-set-in-env}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-set-in-env}
            scope: openid,email,profile
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-in-production-min32chars}
    expiration-ms: 86400000
  cookie:
    secure: true
    same-site: Strict
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:4200/portal/dashboard}
