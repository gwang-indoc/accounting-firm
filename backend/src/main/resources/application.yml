spring:
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE_MB:10}MB
      max-request-size: ${UPLOAD_MAX_FILE_SIZE_MB:10}MB
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,email,profile
  flyway:
    enabled: true

contact:
  notification-email: ${CONTACT_NOTIFICATION_EMAIL}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  cookie:
    secure: false
    same-site: Strict
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:4200/portal/dashboard}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    max-file-size-mb: ${UPLOAD_MAX_FILE_SIZE_MB:10}
    max-filename-length: ${UPLOAD_MAX_FILENAME_LENGTH:100}
    blocked-extensions: ${BLOCKED_EXTENSIONS:exe,js}
