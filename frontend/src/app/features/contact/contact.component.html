<div class="contact-page">
  <mat-card class="contact-form-card">
    <mat-card-header>
      <mat-card-title>Contact Us</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
          <mat-error>Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-error>Enter a valid email address</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Subject</mat-label>
          <input matInput formControlName="subject" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Message</mat-label>
          <textarea matInput formControlName="message" rows="6"></textarea>
          <mat-error>Message is too long (5000 character limit)</mat-error>
        </mat-form-field>

        <!-- Honeypot: off-screen, hidden from keyboard and screen readers -->
        <input
          formControlName="companyUrl"
          name="companyUrl"
          tabindex="-1"
          aria-hidden="true"
          autocomplete="off"
          style="position:absolute; left:-9999px; width:1px; height:1px; overflow:hidden;"
        />

        <button
          mat-stroked-button
          color="primary"
          type="submit"
          [disabled]="form.invalid || submitting()">
          Send Message
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
