<div class="login-email-page">
  <mat-card class="login-email-card">

    <div class="card-top-accent"></div>

    <div class="card-brand">
      <div class="card-icon">税</div>
      <div class="card-brand-text">
        <span class="card-brand-name">GWH Accounting</span>
        <span class="card-brand-tagline">Secure Tax & Accounting Portal</span>
      </div>
    </div>

    <div class="form-header">
      <span class="form-eyebrow">Email Sign In</span>
      <h1 class="form-heading">Welcome back</h1>
      <p class="form-sub">Use your email and password</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-email-form">

      <mat-form-field appearance="outline" class="field">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
      </mat-form-field>

      @if (loginError()) {
        <div class="login-error" data-testid="login-error">
          <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
          </svg>
          Invalid email or password
        </div>
      }

      <button mat-flat-button color="primary" type="submit" class="submit-btn">
        Sign In
      </button>

      <a mat-button routerLink="/login" class="back-link">← Back to Login</a>

    </form>

  </mat-card>
</div>
