<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Client Portal</mat-card-title>
      <mat-card-subtitle>Sign in to access your account</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <a mat-flat-button style="background:#4285f4;color:white;width:100%" href="/oauth2/authorization/google">
        Sign in with Google
      </a>
      <mat-divider></mat-divider>
      <a mat-stroked-button routerLink="/register" style="width:100%">Register New Account</a>
      <mat-divider></mat-divider>
      <a mat-button routerLink="/login/email" style="width:100%">Sign in with Email →</a>
    </mat-card-content>
  </mat-card>
</div>
