<div class="thread-view">
  <button class="back-link" data-testid="back-link" (click)="goBack()">← {{ 'messages.backToMessages' | translate }}</button>

  <div class="page-header">
    <h1 class="page-title">{{ thread()?.subject }}</h1>
  </div>

  <div class="messages-container">
    @for (msg of messages; track msg.id) {
      <div class="msg-wrapper" [class.msg-client]="msg.senderType === 'CLIENT'" [class.msg-admin]="msg.senderType === 'ADMIN'">
        <div class="sender-label">{{ senderLabel(msg) }}</div>
        <div class="bubble">{{ msg.body }}</div>
        <div class="timestamp">{{ msg.sentAt | date:'short' }}</div>
      </div>
    }
  </div>

  <div class="compose-area">
    <textarea
      class="reply-textarea"
      data-testid="reply-textarea"
      rows="3"
      [attr.placeholder]="'messages.reply' | translate"
      aria-label="Reply message"
      [value]="replyBody()"
      (input)="onReplyInput($event)"
    ></textarea>
    <button
      class="send-btn"
      data-testid="send-btn"
      [disabled]="!canSend"
      (click)="send()"
    >{{ 'messages.send' | translate }}</button>
  </div>
</div>
