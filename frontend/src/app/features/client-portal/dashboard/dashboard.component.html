<mat-toolbar color="primary">
  <span>Client Portal</span>
  <span class="toolbar-spacer"></span>
  <button mat-stroked-button (click)="logout()">Logout</button>
</mat-toolbar>

<div class="dashboard-content">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Welcome, {{ authService.currentUser()?.name }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>You are logged in as {{ authService.currentUser()?.email }}</p>
    </mat-card-content>
  </mat-card>
</div>
