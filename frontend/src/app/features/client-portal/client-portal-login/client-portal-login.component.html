<div class="login-container">
  <button
    class="login-btn"
    data-testid="client-login-btn"
    (click)="toggle(); $event.stopPropagation()"
  >
    Client Login
  </button>

  @if (isOpen()) {
  <div class="login-dropdown">
    <h3>Client Portal</h3>
    <p>Secure access to your accounting documents and reports.</p>
    <a
      data-testid="google-signin-link"
      href="/oauth2/authorization/google"
      class="google-signin-btn"
    >
      Sign in with Google
    </a>
    <p class="security-label">🔒 Secured with Google OAuth2</p>
  </div>
  }
</div>
