<mat-toolbar color="primary" class="navbar-toolbar">
  <div class="brand">
    <div class="logo-icon">税</div>
    <div class="brand-text">
      <span class="company-name">GWH Accounting</span>
      <span class="tagline">Secure Tax & Accounting Portal</span>
    </div>
  </div>

  <div class="nav-links">
    <a mat-button href="#services">Services</a>
    <a mat-button href="#security">Security</a>
    <button mat-button [matMenuTriggerFor]="loginMenu" data-testid="client-login-btn">Client Login</button>
    <mat-menu #loginMenu panelClass="login-menu-panel">
      <h3>Client Portal</h3>
      <p>Secure access to your accounting documents and reports.</p>
      <a
        mat-menu-item
        data-testid="google-signin-link"
        href="/oauth2/authorization/google"
        class="google-signin-btn"
      >Sign in with Google</a>
      <p class="security-label">🔒 Secured with Google OAuth2</p>
    </mat-menu>
    <a mat-button routerLink="/contact">Contact</a>
    <a mat-flat-button routerLink="/contact" class="cta-btn">Book Consultation</a>
  </div>

  <div class="lang-toggle">
    <button
      data-testid="lang-en"
      class="lang-pill"
      [class.active]="lang() === 'en'"
      (click)="setLang('en')"
    >EN</button>
    <button
      data-testid="lang-zh"
      class="lang-pill"
      [class.active]="lang() === 'zh'"
      (click)="setLang('zh')"
    >中文</button>
  </div>

  <button class="hamburger" data-testid="hamburger" (click)="menuOpen.update(v => !v)">{{ menuOpen() ? '✕' : '☰' }}</button>
</mat-toolbar>

@if (menuOpen()) {
  <div class="mobile-drawer">
    <a href="#services">Services</a>
    <a href="#security">Security</a>
    <app-client-portal-login class="drawer-item" />
    <a routerLink="/contact">Contact</a>
    <a routerLink="/contact" class="cta-btn">Book Consultation</a>
    <div class="lang-toggle">
      <button
        data-testid="lang-en-mobile"
        class="lang-pill"
        [class.active]="lang() === 'en'"
        (click)="setLang('en')"
      >EN</button>
      <button
        data-testid="lang-zh-mobile"
        class="lang-pill"
        [class.active]="lang() === 'zh'"
        (click)="setLang('zh')"
      >中文</button>
    </div>
  </div>
}
