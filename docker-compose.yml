# Local-dev orchestration. Reads secrets from the repo root .env
# (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, JWT_SECRET, CONTACT_NOTIFICATION_EMAIL, etc.)
# but overrides datasource URL to point at the `db` service.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: accounting_firm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d accounting_firm"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/accounting_firm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      OAUTH2_REDIRECT_URI_ADMIN: http://localhost:4200/admin/clients
      OAUTH2_REDIRECT_URI_USER: http://localhost:4200/portal/dashboard
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  db_data:
  backend_uploads:
